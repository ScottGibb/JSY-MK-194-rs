[package]
name = "jsy-mk-194-rs"
version = "0.1.0"
edition = "2024"

[features]
default = ["sync"]
sync = ["maybe-async/is_sync", "dep:embedded-io"]
async = ["dep:embedded-io-async"]
defmt = ["dep:defmt"]
advanced = []

[dependencies]
maybe-async = "0.2"
arbitrary-int = "2"
bitbybit = "2"
uom = { version = "0.38",default-features = false, features = ["autoconvert", "si", "f32",]}
visibility = "0.1"

embedded-io = {version = "0.7.1", optional = true}
embedded-io-async = {version = "0.7.0", optional = true}
defmt = {version = "1", optional = true}




