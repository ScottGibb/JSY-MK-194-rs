name: Continuous Build

on:
  push:
  pull_request:
    branches: [main]

jobs:
  docs:
    name: Docs and doctests (std-sync)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run doctests
        run: cargo test --doc --features std-sync
      - name: Build docs
        run: cargo doc --no-deps --features std-sync

  build-sync:
    name: Build with sync feature
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build (sync)
        run: cargo build --no-default-features --features sync --all-targets
      - name: Build with advanced feature
        run: cargo build --no-default-features --features "sync advanced" --all-targets
      - name: Build with defmt feature
        run: cargo build --no-default-features --features "sync defmt" --all-targets

  build-async:
    name: Build with async feature
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --no-default-features --features async --all-targets
      - name: Build with advanced feature
        run: cargo build --no-default-features --features "async advanced" --all-targets
      - name: Build with defmt feature
        run: cargo build --no-default-features --features "async defmt" --all-targets

  build-std-sync:
    name: Build with std-sync feature
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --no-default-features --features "std-sync" --all-targets
      - name: Build with advanced feature
        run: cargo build --no-default-features --features "std-sync advanced" --all-targets

  build-tokio-async:
    name: Build with tokio-async feature
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --no-default-features --features "tokio-async" --all-targets
      - name: Build with advanced feature
        run: cargo build --no-default-features --features "tokio-async advanced" --all-targets

  build-esp32c3:
    name: Build for ESP32-C3 target
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust target
        run: rustup target add riscv32imc-unknown-none-elf
      - name: Build for ESP32-C3
        run: |
          cd examples/esp32c3
          cargo build
  
  build-stm32f103:
    name: Build for STM32F103 target
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust target
        run: rustup target add thumbv7m-none-eabi
      - name: Build for STM32F103
        run: |
          cd examples/stm32f103
          cargo build
          
